<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diccionario · IF7102 Multimedios</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Diccionario Multimedios</h1>
    <p>// IF7102 · UCR · Haz clic en un término para ver su definición</p>
  </header>

  <main>
    <section class="search-section">
      <input type="text" id="searchInput" placeholder="Buscar término..." autofocus />
      <div class="filters">
        <button data-filter="all" class="active">Todos</button>
        <button data-filter="control">Control del Proyecto</button>
        <button data-filter="css">CSS</button>
        <button data-filter="dom">DOM</button>
        <button data-filter="eventos">Eventos</button>
        <button data-filter="rendimiento">Rendimiento</button>
        <button data-filter="webcomponents">Web Components</button>
      </div>
    </section>

    <section class="terms-list" id="termsList"></section>

    <dialog id="termModal">
      <button id="closeModal" aria-label="Cerrar">&times;</button>
      <p id="modalCategory"></p>
      <h2 id="modalTitle"></h2>
      <p id="modalDefinition"></p>
      <div id="modalContext"></div>
    </dialog>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
